  Card.Update.Updater:
    class: src/Contexts/Core/Card/application/Update/Updater
    arguments: ['@Card.Repository']

  Card.Update.UpdateCardCommandHandler:
    class: src/Contexts/Core/Card/application/Update/UpdateCardCommandHandler
    arguments: ["@Card.Update.Updater"]
    tags:
      - { name: "commandHandler" }

  Card.UpdateLimit.UpdateCardLimit:
    class: src/Contexts/Core/Card/application/UpdateLimit/UpdateCardLimit
    arguments: ['@Card.Repository']

  Card.UpdateLimit.UpdateCardLimitCommandHandler:
    class: src/Contexts/Core/Card/application/UpdateLimit/UpdateCardLimitCommandHandler
    arguments: ["@Card.UpdateLimit.UpdateCardLimit"]
    tags:
      - { name: "commandHandler" }

  Card.Delete.Deleter:
    class: src/Contexts/Core/Card/application/Delete/Deleter
    arguments: ['@Card.Repository']

  Card.Delete.DeleteCardCommandHandler:
    class: src/Contexts/Core/Card/application/Delete/DeleteCardCommandHandler
    arguments: ["@Card.Delete.Deleter"]
    tags:
      - { name: "commandHandler" }


  # =====================
  # TRANSACTION
  # =====================

  Transaction.Repository:
    class: src/Contexts/Core/Transaction/infrastructure/persistence/TypeOrmTransactionRepository
    arguments: ["@Shared.ORM.Connection"]

  Transaction.Create.Creator:
    class: src/Contexts/Core/Transaction/application/Create/Creator
