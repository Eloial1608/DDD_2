  # ACCOUNT
  # =====================

  Account.Repository:
    class: src/Contexts/Core/Account/infrastructure/persistence/TypeOrmAccountRepository
    arguments: ["@Shared.ORM.Connection"]

  Account.Create.Creator:
    class: src/Contexts/Core/Account/application/Create/Creator
    arguments: ['@Account.Repository']

  Account.Create.CreateAccountCommandHandler:
    class: src/Contexts/Core/Account/application/Create/CreateAccountCommandHandler
    arguments: ["@Account.Create.Creator"]
    tags:
      - { name: "commandHandler" }

  Account.FindByCriteria.FinderByCriteria:
    class: src/Contexts/Core/Account/application/FindByCriteria/FinderByCriteria
    arguments: ['@Account.Repository']

  Account.FindByCriteria.FindAccountsByCriteriaQueryHandler:
    class: src/Contexts/Core/Account/application/FindByCriteria/FindAccountsByCriteriaQueryHandler
    arguments: ['@Account.FindByCriteria.FinderByCriteria']
    tags:
      - { name: "queryHandler" }

  Account.FindById.FinderById:
