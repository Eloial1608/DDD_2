    arguments: ['@Account.Repository']

  Account.Update.UpdateAccountCommandHandler:
    class: src/Contexts/Core/Account/application/Update/UpdateAccountCommandHandler
    arguments: ["@Account.Update.Updater"]
    tags:
      - { name: "commandHandler" }

  Account.Delete.Deleter:
    class: src/Contexts/Core/Account/application/Delete/Deleter
    arguments: ['@Account.Repository']

  Account.Delete.DeleteAccountCommandHandler:
    class: src/Contexts/Core/Account/application/Delete/DeleteAccountCommandHandler
    arguments: ["@Account.Delete.Deleter"]
    tags:
      - { name: "commandHandler" }

