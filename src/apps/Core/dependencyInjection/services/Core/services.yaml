services:

  # =====================
  # USER
  # =====================

  User.Repository:
    class: src/Contexts/Core/User/infrastructure/persistence/TypeOrmUserRepository
    arguments: ["@Shared.ORM.Connection"]

  User.FindByCriteria.FinderByCriteria:
    class: src/Contexts/Core/User/application/FindByCriteria/FinderByCriteria
    arguments: ['@User.Repository']

  User.FindByCriteria.FindUsersByCriteriaQueryHandler:
    class: src/Contexts/Core/User/application/FindByCriteria/FindUsersByCriteriaQueryHandler
    arguments: ['@User.FindByCriteria.FinderByCriteria']
    tags:
      - { name: "queryHandler" }

  User.FindById.FinderById:
    class: src/Contexts/Core/User/application/FindById/FinderById
    arguments: ['@User.Repository']

  User.FindById.FindUserByIdQueryHandler:
    class: src/Contexts/Core/User/application/FindById/FindUserByIdQueryHandler
    arguments: ['@User.FindById.FinderById']
    tags:
      - { name: "queryHandler" }

  User.Create.Creator:
    class: src/Contexts/Core/User/application/Create/Creator
    arguments: ['@User.Repository']

  User.Create.CreateUserCommandHandler:
    class: src/Contexts/Core/User/application/Create/CreateUserCommandHandler
    arguments: ["@User.Create.Creator"]
    tags:
      - { name: "commandHandler" }

  User.Update.Updater:
    class: src/Contexts/Core/User/application/Update/Updater
    arguments: ['@User.Repository']

  User.Update.UpdateUserCommandHandler:
    class: src/Contexts/Core/User/application/Update/UpdaterUserCommandHandler
    arguments: ["@User.Update.Updater"]
    tags:
      - { name: "commandHandler" }

  User.UpdateIsAdmin.UpdaterIsAdmin:
    class: src/Contexts/Core/User/application/UpdateIsAdmin/UpdaterIsAdmin
    arguments: ['@User.Repository']

  User.UpdateIsAdmin.UpdateIsAdminUserCommandHandler:
    class: src/Contexts/Core/User/application/UpdateIsAdmin/UpdateIsAdminUserCommandHandler
    arguments: ["@User.UpdateIsAdmin.UpdaterIsAdmin"]
    tags:
      - { name: "commandHandler" }

  User.UpdatePassword.UpdatePassword:
    class: src/Contexts/Core/User/application/UpdatePassword/UpdatePassword
    arguments: ["@User.Repository"]

  User.UpdatePassword.UpdatePasswordUserCommandHandler:
    class: src/Contexts/Core/User/application/UpdatePassword/UpdatePasswordUserCommandHandler
    arguments: ["@User.UpdatePassword.UpdatePassword"]
    tags:
      - { name: "commandHandler" }

  User.Delete.Deleter:
    class: src/Contexts/Core/User/application/Delete/Deleter
    arguments: ['@User.Repository']

  User.Delete.DeleteUserCommandHandler:
    class: src/Contexts/Core/User/application/Delete/DeleteUserCommandHandler
    arguments: ["@User.Delete.Deleter"]
    tags:
      - { name: "commandHandler" }

