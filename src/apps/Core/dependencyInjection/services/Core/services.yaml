    arguments: ['@Account.Repository']

  Account.FindById.FindAccountByIdQueryHandler:
    class: src/Contexts/Core/Account/application/FindById/FindAccountByIdQueryHandler
    arguments: ['@Account.FindById.FinderById']
    tags:
      - { name: "queryHandler" }

  Account.Update.Updater:
